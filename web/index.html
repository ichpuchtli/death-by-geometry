<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <title>Death by Geometry</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100dvw; height: 100dvh; overflow: hidden; background: #000;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      padding: 0;
      position: fixed;
      top: 0; left: 0;
    }
    canvas#game {
      display: block; touch-action: none; cursor: none;
      position: fixed;
      top: 0; left: 0;
      width: 100dvw;
      height: 100dvh;
    }
    canvas#hud {
      position: fixed;
      top: 0; left: 0;
      width: 100dvw;
      height: 100dvh;
      pointer-events: none;
      touch-action: none;
    }
    #rotate-prompt {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      color: #20ff20;
      font-family: monospace;
      font-size: 20px;
      z-index: 100;
      justify-content: flex-start;
      align-items: center;
      text-align: center;
      flex-direction: column;
      padding: 24px 0 40px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    @media screen and (orientation: portrait) and (max-width: 768px) {
      #rotate-prompt { display: flex; }
    }
    #desktop-settings {
      display: none;
      position: fixed;
      top: 0;
      right: 0;
      height: 100dvh;
      overflow-y: auto;
      z-index: 50;
      padding: 16px 0;
      pointer-events: auto;
      cursor: default;
      background: rgba(0, 0, 0, 0.6);
      border-left: 1px solid rgba(32, 255, 32, 0.15);
    }
  </style>
</head>
<body>
  <div id="rotate-prompt">
    <div>&#x21BB;</div>
    <div style="margin-top: 16px;">Rotate to landscape to play</div>
    <div id="settings-mount" style="margin-top: 20px; width: 100%;"></div>
  </div>
  <canvas id="game"></canvas>
  <canvas id="hud"></canvas>
  <div id="desktop-settings"></div>
  <script type="module" src="/src/index.ts"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>
</body>
</html>
