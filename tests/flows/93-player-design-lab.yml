name: "Player Design Lab v2 — 8 claw ships + engine tails + bullet grid wakes"
tags: [lab, player, visual, ship]
steps:
  - action: launch
    url: "/?player=1"
    waitFor: "canvas#game"

  - action: wait
    ms: 2000

  - action: evalCheck
    description: "Lab booted with 8 claw designs, GRID FX wake variants, Wake default, tails emitting"
    script: |
      const l = window.playerDesignLab;
      if (!l) return false;
      if (!Array.isArray(l.soundVariants) || l.soundVariants.length !== 6) return false;
      if (l.muzzleVariants.length !== 4 || l.bulletVariants.length !== 4) return false;
      if (!Array.isArray(l.gridFxVariants) || l.gridFxVariants.length !== 5) return false;
      if (l.gridFxVariants[l.gridFxIndex] !== 'Wake') return false;
      if (l.focus !== -1) return false;
      // tail particle system is live
      if (!Array.isArray(l.tail) || l.tail.length < 20) return false;
      return l.soundVariants.includes('Laser Zap');

  # (a) Grid overview — 8 fully-rendered claw ships on patrol with tails + wakes
  - action: screenshot
    name: "93-player-lab-grid"

  # (b) Focus ship 2 (Talon) — big figure-eight patrol, camera follows, tail streams
  - action: keyPress
    key: "2"
    duration: 60
  - action: wait
    ms: 3000

  - action: evalCheck
    description: "Pressing 2 focuses ship index 1 (Talon), patrolling with a rich tail"
    script: |
      const l = window.playerDesignLab;
      return l.focus === 1 && l.tail.length > 40;

  - action: screenshot
    name: "93-player-lab-focus-tail"

  # (c) Wake (default) — bullets part the fabric with a leading bow wave
  - action: evalCheck
    description: "Wake active with live bullets warping the grid"
    script: |
      const l = window.playerDesignLab;
      return l.gridFxVariants[l.gridFxIndex] === 'Wake' && l.bullets.length > 0;

  - action: screenshot
    name: "93-player-lab-wake"

  # (d) Wake Heavy variant
  - action: keyPress
    key: "x"
    duration: 60
  - action: wait
    ms: 1500

  - action: evalCheck
    description: "X advanced grid FX to Wake Heavy"
    script: |
      return window.playerDesignLab.gridFxVariants[window.playerDesignLab.gridFxIndex] === 'Wake Heavy';

  - action: screenshot
    name: "93-player-lab-wake-heavy"

  # (e) Rip Trail variant
  - action: keyPress
    key: "x"
    duration: 60
  - action: wait
    ms: 1500

  - action: evalCheck
    description: "X advanced grid FX to Rip Trail"
    script: |
      return window.playerDesignLab.gridFxVariants[window.playerDesignLab.gridFxIndex] === 'Rip Trail';

  - action: screenshot
    name: "93-player-lab-rip-trail"

  # Z cycles backwards
  - action: keyPress
    key: "z"
    duration: 60
  - action: wait
    ms: 200

  - action: evalCheck
    description: "Z cycled grid FX back to Wake Heavy"
    script: |
      return window.playerDesignLab.gridFxVariants[window.playerDesignLab.gridFxIndex] === 'Wake Heavy';

  # Reset: back to grid, grid FX back to Wake default (checked synchronously —
  # tail/bullets refill within a frame or two, so they're not asserted here)
  - action: keyPress
    key: "0"
    duration: 60
  - action: keyPress
    key: "r"
    duration: 60

  - action: evalCheck
    description: "R reset: grid view restored and grid FX back to Wake default"
    script: |
      const l = window.playerDesignLab;
      return l.focus === -1 && l.gridFxVariants[l.gridFxIndex] === 'Wake';

  - action: wait
    ms: 2500

  - action: screenshot
    name: "93-player-lab-after-reset"

  - action: assertNoErrors
    description: "Lab v2 runs, patrols, fires, and cycles grid FX without JS errors"
