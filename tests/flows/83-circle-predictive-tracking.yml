name: "Circle orbital tracking — supernova circles orbit the player like a BlackHole, no trail"
tags: [regression, blackhole, circle, combat]
steps:
  - action: launch
    url: "/"
    waitFor: "canvas#game"

  - action: wait
    ms: 300

  # Intense phase + heavy pull so BlackHoles overload fast and eject circle flocks.
  - action: evalCheck
    description: "Configure for rapid BH overload"
    script: |
      const settings = JSON.parse(localStorage.getItem('gg_settings') || '{}');
      settings.startingPhase = 'intense';
      settings.startingLives = 99;
      settings.spawnRateMultiplier = 4;
      settings.maxEnemies = 200;
      settings.bhEnemyPull = 24;
      settings.bhAttractRadius = 600;
      localStorage.setItem('gg_settings', JSON.stringify(settings));
      return true;

  - action: launch
    url: "/"
    waitFor: "canvas#game"

  - action: wait
    ms: 300

  - action: click
    selector: "canvas#game"
    x: 0.5
    y: 0.5

  - action: wait
    ms: 200

  - action: keyPress
    key: "f"
    duration: 100

  - action: mouseMove
    x: 800
    y: 400

  - action: evalCheck
    description: "Init circle tracker"
    script: |
      window.__circleSeen = false;
      window.__maxCircleDist = 0;
      return true;

  # Play so a supernova fires and ejects a circle flock.
  - action: keys
    keys: ["w", "d"]
    duration: 4000
  - action: keys
    keys: ["s", "a"]
    duration: 4000
  - action: keys
    keys: ["w", "a"]
    duration: 4000

  - action: evalCheck
    description: "Circles carry ORBITAL momentum (spring toward player, momentum retained — not hard-set)"
    script: |
      const g = window.game;
      if (!g) return false;
      const circ = g.enemies.find(e => e.active && !e.isSpawning && e.family === 'circle');
      if (!circ) return true; // no supernova yet — later checks still run
      window.__circleSeen = true;
      // Player to the circle's +x, circle already moving +y. Orbital: spring adds +x while
      // the +y momentum is RETAINED (a hard-set-at-player would zero the +y).
      g.player.position.x = circ.position.x + 300;
      g.player.position.y = circ.position.y;
      circ.velocity.x = 0; circ.velocity.y = 0.3;
      circ.update(16, g.player.position, g.player.velocity);
      return circ.velocity.x > 0 && circ.velocity.y > 0.2;

  - action: evalCheck
    description: "Circles have NO trail (hasTrail false, trailId unset)"
    script: |
      const g = window.game;
      const circ = g.enemies.find(e => e.active && e.family === 'circle');
      if (!circ) return true;
      return circ.hasTrail === false && circ.trailId === -1;

  # Circles are spring-bound to the player — they orbit rather than escaping to the arena edge.
  - action: keys
    keys: ["s", "d"]
    duration: 4000
  - action: evalCheck
    script: |
      const g = window.game; if (!g) return true;
      for (const e of g.enemies) {
        if (e.active && !e.isSpawning && e.family === 'circle') {
          window.__circleSeen = true;
          const d = Math.hypot(e.position.x - g.player.position.x, e.position.y - g.player.position.y);
          window.__maxCircleDist = Math.max(window.__maxCircleDist, d);
        }
      }
      return true;

  - action: screenshot
    name: "83-circle-orbital-tracking"

  - action: evalCheck
    description: "If circles appeared, they stayed spring-bound near the player (never flung off)"
    script: |
      if (!window.__circleSeen) return true;
      return window.__maxCircleDist < 1400;

  - action: assertNoErrors
    description: "Orbital circles + dust shed + hit sparks run without JS errors"
