name: "Ported supernova — overloaded BlackHole detonates with chaos payload in real game"
tags: [blackhole, supernova, regression]
steps:
  - action: launch
    url: "/"
    waitFor: "canvas#game"

  - action: wait
    ms: 300

  # Intense phase (BlackHoles in spawn pools), slow enemies + no player pull so the
  # idle test player survives, high spawn rate so a BlackHole appears quickly
  - action: evalCheck
    description: "Configure settings for supernova testing"
    script: |
      const settings = JSON.parse(localStorage.getItem('gg_settings') || '{}');
      settings.startingPhase = 'intense';
      settings.startingLives = 99;
      settings.spawnRateMultiplier = 3;
      settings.maxEnemies = 200;
      settings.enemySpeedMultiplier = 0.1;
      settings.bhPlayerPull = 0;
      localStorage.setItem('gg_settings', JSON.stringify(settings));
      return true;

  - action: launch
    url: "/"
    waitFor: "canvas#game"

  - action: wait
    ms: 300

  - action: click
    selector: "canvas#game"
    x: 0.5
    y: 0.5

  # Poll until a BlackHole spawns (3x spawn rate, intense pools), then force-feed it
  # to critical mass via the real absorb path
  - action: waitForEval
    timeout: 45000
    description: "Feeding to the OLD threshold (12) must NOT destabilize — capacity was raised to 22"
    script: |
      const g = window.game;
      const bh = g.enemies.find(e => e.family === 'blackhole' && e.active && !e.isSpawning);
      if (!bh) return false;
      window.__bh = bh;
      while (bh.absorbedCount < 12) bh.absorbEnemy();
      // Regression guard: at 12 the hole is still swelling, not yet critical (MAX_ABSORB 12→22).
      return bh.destabilizing === false;

  - action: assertEval
    description: "Feed the rest to MAX_ABSORB (22) — destabilize must start"
    script: |
      const bh = window.__bh;
      while (bh.absorbedCount < 22) bh.absorbEnemy();
      return bh.absorbedCount === 22 && bh.destabilizing === true;

  # Life-stage dust emission: a destabilizing hole actively sheds an inrushing dust storm,
  # so the field's live mote count climbs well above the ambient baseline (~420) even with
  # the test player idle (no thruster wake).
  - action: wait
    ms: 250
  - action: assertEval
    description: "Destabilizing BlackHole emits a dust storm (mote count above ambient)"
    script: |
      const g = window.game;
      return window.__bh.destabilizing === true && g.field.count > 480;

  # 350ms fuse — detonation must fire even with no bullets touching it
  # (regression: the old code only detonated inside the absorb branch)
  - action: wait
    ms: 1000

  - action: assertEval
    description: "BlackHole detonated on its own, ejected ~18 circles (all gravity-immune), and erupted dust"
    script: |
      const g = window.game;
      const circleEnemies = g.enemies.filter(e => e.active && e.family === 'circle');
      const circles = circleEnemies.length;
      // round(22 * 0.8) = 18 emitted (kept ~18 despite MAX_ABSORB 12→22); some may have orbited into the player.
      const allImmune = circleEnemies.every(e => e.gravityImmune === true);
      return window.__bh.active === false && circles >= 8 && circles <= 20 && allImmune && g.field.count > 450;

  - action: screenshot
    name: "78-supernova-chaos"

  - action: assertNoErrors
