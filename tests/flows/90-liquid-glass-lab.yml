name: "Liquid Glass Lab — GLSL refractive-material variants + concave tuning bench"
tags: [lab, glass, liquid, visual]
steps:
  - action: launch
    url: "/?liquid=1"
    waitFor: "canvas#game"

  - action: wait
    ms: 1200

  - action: evalCheck
    description: "Lab boots with 8 variants, focused on Concave (index 4) as the tuning bench"
    script: |
      const l = window.liquidGlassLab;
      if (!l) return false;
      if (!Array.isArray(l.variants) || l.variants.length !== 8) return false;
      if (l.focus !== 4) return false;
      return l.variants[4].name.indexOf('Concave') !== -1;

  - action: screenshot
    name: "90-liquid-glass-concave"

  # Tuning knob: X deepens the pinch (mag multiplier up).
  - action: keyPress
    key: "x"
    duration: 60
  - action: keyPress
    key: "x"
    duration: 60
  - action: wait
    ms: 120
  - action: evalCheck
    description: "X deepens the concave pinch (tune.mag rises above 1)"
    script: |
      return window.liquidGlassLab.tune.mag > 1.0;

  # Photon-ring overlay preview (concave + spectral ring combo).
  - action: keyPress
    key: "o"
    duration: 60
  - action: wait
    ms: 120
  - action: evalCheck
    description: "O enables the photon-ring overlay"
    script: |
      return window.liquidGlassLab.ringOverlay === true;

  - action: screenshot
    name: "90-liquid-glass-concave-ring"

  # Back to the full variant grid.
  - action: keyPress
    key: "0"
    duration: 60
  - action: wait
    ms: 120
  - action: evalCheck
    description: "0 returns to the variant grid"
    script: |
      return window.liquidGlassLab.focus === -1;

  - action: screenshot
    name: "90-liquid-glass-grid"

  - action: assertNoErrors
    description: "GLSL refraction pass + tuning knobs + ring overlay run without JS/GL errors"
