name: "Sierpinski cracks into sub-triangles instantly (no disappear/reappear)"
tags: [boss, sierpinski, visual]
steps:
  - action: launch
    url: "/"
    waitFor: "canvas#game"
  - action: click
    selector: "canvas#game"
  - action: wait
    ms: 400

  # Spawn a tier-0 boss and rotate it to a known angle so we can prove the
  # children inherit its orientation.
  - action: evalCheck
    description: "Tier-0 boss present with a distinct rotation"
    script: |
      const g = window.game;
      const boss = g.debugSpawnSierpinski(0);
      boss.rotation = 0.9;
      window.__boss = boss;
      return boss && boss.tier === 0 && boss.spawnTimer === 0;

  - action: screenshot
    name: "99-sierpinski-boss-intact"

  # Kill the boss — it must crack into 3 tier-1 fragments that appear INSTANTLY
  # (spawnTimer === 0, no warp-in) and inherit the parent rotation.
  - action: evalCheck
    description: "Boss cracks into 3 instant, rotation-matched tier-1 fragments"
    script: |
      const g = window.game;
      // The boss keeps spinning, so capture its live rotation at the instant of the kill.
      const rotAtKill = window.__boss.rotation;
      g.debugKillEnemy(window.__boss, 0);
      const kids = g['enemies'].filter(e => e.family === 'sierpinski' && e.tier === 1);
      if (kids.length !== 3) return false;
      // Instant: no spawn animation in progress
      if (!kids.every(k => k.spawnTimer === 0 && !k.isSpawning)) return false;
      // Inherit the parent's orientation (crack, not respawn)
      if (!kids.every(k => Math.abs(k.rotation - rotAtKill) < 0.001)) return false;
      window.__kids = kids;
      return true;

  - action: screenshot
    name: "99-sierpinski-cracked-tier1"

  # Let the crack momentum play out — fragments should spread apart, not re-materialise.
  - action: wait
    ms: 250
  - action: screenshot
    name: "99-sierpinski-spread"

  # Crack a tier-1 fragment → 3 tier-2, still instant. Tier-2 is the LAST layer.
  - action: evalCheck
    description: "Tier-1 cracks into 3 instant tier-2 fragments"
    script: |
      const g = window.game;
      g.debugKillEnemy(window.__kids[0], 0);
      const t2 = g['enemies'].filter(e => e.family === 'sierpinski' && e.tier === 2);
      if (t2.length < 3) return false;
      if (!t2.every(k => k.spawnTimer === 0 && !k.isSpawning)) return false;
      window.__t2 = t2[0];
      return true;

  # Kill a tier-2 (last layer) → it shatters completely, spawning NO children.
  - action: evalCheck
    description: "Last-layer tier-2 shatters completely (no children)"
    script: |
      const g = window.game;
      const before = g['enemies'].filter(e => e.family === 'sierpinski' && e.tier === 2).length;
      g.debugKillEnemy(window.__t2, 0);
      const after = g['enemies'].filter(e => e.family === 'sierpinski' && e.tier === 2).length;
      // Exactly one removed, nothing spawned in its place
      return after === before - 1;

  - action: screenshot
    name: "99-sierpinski-last-shatter"

  - action: assertNoErrors
    description: "Crack destruction runs without JS errors"
