name: "BlackHole concave refraction — scene lenses behind holes in-game (no ring)"
tags: [blackhole, refraction, glass, visual]
steps:
  - action: launch
    url: "/"
    waitFor: "canvas#game"
  - action: wait
    ms: 300

  - action: evalCheck
    description: "Configure so a BlackHole appears fast and the idle test player survives"
    script: |
      const s = JSON.parse(localStorage.getItem('gg_settings') || '{}');
      s.startingPhase = 'intense';
      s.startingLives = 99;
      s.spawnRateMultiplier = 4;
      s.maxEnemies = 200;
      s.enemySpeedMultiplier = 0.1;
      s.bhPlayerPull = 0;
      localStorage.setItem('gg_settings', JSON.stringify(s));
      return true;

  - action: launch
    url: "/"
    waitFor: "canvas#game"
  - action: wait
    ms: 300
  - action: click
    selector: "canvas#game"
    x: 0.5
    y: 0.5

  # Spy on the refraction pass (private field, runtime-accessible).
  - action: evalCheck
    description: "Install a spy on RefractionPass.apply"
    script: |
      const r = window.game.refraction;
      if (!r || typeof r.apply !== 'function') return false;
      window.__refr = 0;
      const orig = r.apply.bind(r);
      r.apply = (...a) => { window.__refr++; return orig(...a); };
      return true;

  # Wait for a fully spawned-in BlackHole (refraction only lenses formed holes).
  - action: waitForEval
    description: "A BlackHole has finished spawning"
    timeout: 45000
    script: |
      const bh = window.game.enemies.find(e => e.family === 'blackhole' && e.active && !e.isSpawning);
      return !!bh;

  - action: wait
    ms: 300

  - action: assertEval
    description: "The concave refraction pass ran while a hole was on screen"
    script: |
      return window.__refr >= 1;

  - action: assertEval
    description: "BlackHole no longer draws the spectral photon ring (renderGlassDiffraction removed)"
    script: |
      const bh = window.game.enemies.find(e => e.family === 'blackhole' && e.active);
      return bh && typeof bh.renderGlassDiffraction === 'undefined';

  - action: screenshot
    name: "91-blackhole-refraction"

  - action: assertNoErrors
    description: "Refraction FBO pass + bloom sceneTexOverride run without JS/GL errors"
